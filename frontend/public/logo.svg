  <line x1="79" y1="117" x2="125" y2="117" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round"/>

  <circle cx="102" cy="76" r="7" fill="#FFFFFF"/>
  <circle cx="79" cy="117" r="7" fill="#FFFFFF"/>
  <circle cx="125" cy="117" r="7" fill="#FFFFFF"/>
</svg>
