<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arrowSuspect" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e5484d"/>
    </marker>
  </defs>

  <rect width="1060" height="600" rx="18" fill="#faf9f7"/>

  <!-- ===== column headers ===== -->
  <text x="150" y="52" text-anchor="middle" font-size="13" letter-spacing="2" fill="#9a958c">ENGINEERING KNOWLEDGE</text>
  <text x="530" y="52" text-anchor="middle" font-size="13" letter-spacing="2" fill="#9a958c">MEMORYSCOPE</text>
  <text x="915" y="52" text-anchor="middle" font-size="13" letter-spacing="2" fill="#9a958c">WHO ASKS</text>

  <!-- ===== left: sources ===== -->
  <g>
    <rect x="40" y="80" width="220" height="66" rx="12" fill="#ffffff" stroke="#e6e2da"/>
    <text x="150" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">GitHub PRs</text>
    <text x="150" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">&amp; comments</text>

    <rect x="40" y="162" width="220" height="52" rx="12" fill="#ffffff" stroke="#e6e2da"/>
    <text x="150" y="194" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">ADRs</text>

    <rect x="40" y="230" width="220" height="52" rx="12" fill="#ffffff" stroke="#e6e2da"/>
    <text x="150" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Postmortems</text>
  </g>

  <!-- ===== center: MemoryScope panel ===== -->
  <rect x="360" y="72" width="340" height="300" rx="16" fill="#ffffff" stroke="#BC9AFF" stroke-width="2"/>

  <rect x="392" y="110" width="276" height="78" rx="12" fill="#f4efff" stroke="#d9c8ff"/>
  <text x="530" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#5b3fb0">Cognee memory graph</text>
  <text x="530" y="162" text-anchor="middle" font-size="12" fill="#8a7fb0">remember · recall · improve · forget</text>

  <!-- dotted "records" connector -->
  <path d="M530 188 L530 232" stroke="#b9b2a6" stroke-width="1.6" stroke-dasharray="3 4"/>
  <text x="548" y="214" font-size="11" fill="#9a958c">records</text>

  <rect x="392" y="232" width="276" height="102" rx="12" fill="#fbfaf7" stroke="#e6e2da"/>
  <text x="530" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Citation log</text>
  <text x="530" y="286" text-anchor="middle" font-size="12.5" fill="#6b6459">every answer &#8594; the sources it cited</text>
  <text x="530" y="312" text-anchor="middle" font-size="12.5" fill="#6b6459">deterministic, no model decides</text>

  <!-- ===== right: users ===== -->
  <rect x="820" y="150" width="190" height="120" rx="14" fill="#1a1a1a"/>
  <text x="915" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#faf9f7">Engineers</text>
  <text x="915" y="224" text-anchor="middle" font-size="13" fill="#b8b2a8">/ AI assistant</text>

  <!-- ===== flows ===== -->
  <!-- sources -> scope : remember -->
  <line x1="266" y1="181" x2="352" y2="181" stroke="#3a3a3a" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="309" y="171" text-anchor="middle" font-size="12" fill="#3a3a3a">remember()</text>
  <text x="309" y="199" text-anchor="middle" font-size="11" fill="#9a958c">ingest</text>

  <!-- user -> scope : ask -->
  <path d="M818 168 C 740 120, 720 120, 706 148" fill="none" stroke="#3a3a3a" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="762" y="112" text-anchor="middle" font-size="12" fill="#3a3a3a">ask a question</text>

  <!-- scope -> user : answer + citations -->
  <path d="M706 210 C 760 210, 770 210, 818 210" fill="none" stroke="#3a3a3a" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="762" y="202" text-anchor="middle" font-size="12" fill="#3a3a3a">answer + sources cited</text>

  <!-- user -> scope : forget (correct a fact) -->
  <path d="M818 252 C 750 300, 720 300, 706 288" fill="none" stroke="#3a3a3a" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="758" y="316" text-anchor="middle" font-size="12" fill="#3a3a3a">correct a fact &#183; forget()</text>

  <!-- ===== the backward trace (the point) ===== -->
  <rect x="360" y="430" width="650" height="86" rx="14" fill="#fff5f5" stroke="#f2c2c4"/>
  <text x="384" y="462" font-size="13" letter-spacing="1.5" fill="#e5484d">THE BACKWARD TRACE</text>
  <text x="384" y="488" font-size="14" fill="#8a3a3c">One forget() walks the citation log and flags every past answer</text>
  <text x="384" y="508" font-size="14" fill="#8a3a3c">that trusted the corrected fact as suspect.</text>

  <path d="M530 372 L530 424" stroke="#e5484d" stroke-width="1.8" stroke-dasharray="4 4" marker-end="url(#arrowSuspect)"/>

  <!-- suspect returns to user -->
  <path d="M1010 430 C 1035 360, 1035 300, 1012 262" fill="none" stroke="#e5484d" stroke-width="1.8" marker-end="url(#arrowSuspect)"/>
  <text x="1046" y="360" text-anchor="middle" font-size="12" fill="#e5484d" transform="rotate(90 1046 360)">past answers now suspect</text>
</svg>
